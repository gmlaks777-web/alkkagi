<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>온라인 알까기 · 3D 대전</title>
<style>
  :root{
    --bg:#0b0e14; --panel:rgba(18,22,32,0.82); --line:rgba(255,255,255,0.10);
    --ink:#eef1f7; --sub:#9aa3b2; --p1:#ff5a5f; --p2:#3d8bff;
    --gold:#f6c453; --ok:#54d98c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:"Pretendard","Noto Sans KR",system-ui,-apple-system,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:none}
  #app{position:fixed;inset:0}
  canvas{display:block;position:absolute;inset:0}
  #hud{position:absolute;top:0;left:0;right:0;padding:18px 22px;display:flex;
    align-items:center;justify-content:space-between;pointer-events:none;z-index:20}
  .player{display:flex;align-items:center;gap:12px;background:var(--panel);
    border:1px solid var(--line);border-radius:16px;padding:12px 18px;
    backdrop-filter:blur(14px);min-width:190px}
  .player.right{flex-direction:row-reverse;text-align:right}
  .dot{width:16px;height:16px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 16px currentColor}
  .p1 .dot{background:var(--p1);color:var(--p1)}
  .p2 .dot{background:var(--p2);color:var(--p2)}
  .pmeta{display:flex;flex-direction:column;gap:2px;line-height:1.15}
  .pname{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .pcount{font-size:12px;color:var(--sub);font-weight:600}
  .pcount b{color:var(--ink);font-size:14px}
  #centerbar{display:flex;flex-direction:column;align-items:center;gap:6px}
  #turnpill{background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:8px 20px;font-weight:800;font-size:16px;backdrop-filter:blur(14px);
    display:flex;align-items:center;gap:8px}
  #turnpill .swatch{width:12px;height:12px;border-radius:50%}
  #phase{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:.12em;text-transform:uppercase}
  #hint{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:12px 20px;font-size:14px;color:var(--sub);font-weight:600;
    backdrop-filter:blur(14px);z-index:20;text-align:center;line-height:1.5;
    pointer-events:none;max-width:90vw}
  #hint b{color:var(--ink)}
  #power{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);
    width:min(420px,80vw);height:14px;background:rgba(255,255,255,.06);
    border:1px solid var(--line);border-radius:999px;overflow:hidden;z-index:20;display:none}
  #powerfill{height:100%;width:0%;
    background:linear-gradient(90deg,var(--ok),var(--gold),var(--p1));transition:width .04s linear}
  #backTop{position:absolute;left:22px;bottom:26px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:12px 16px;color:var(--ink);
    font-weight:700;font-size:14px;backdrop-filter:blur(14px);z-index:21;cursor:pointer;display:none}
  #backTop:active{transform:scale(.96)}
  #skillBar{position:absolute;right:22px;bottom:26px;display:flex;gap:10px;z-index:21}
  #skillBar.hide{display:none}
  .skillBtn{background:linear-gradient(135deg,#7a2ff2,#c026d3);border:1px solid rgba(255,255,255,.25);
    border-radius:12px;padding:12px 16px;color:#fff;font-weight:800;font-size:14px;
    font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(120,20,220,.4);backdrop-filter:blur(14px)}
  .skillBtn:active{transform:scale(.95)}
  .skillBtn:disabled{opacity:.4;filter:grayscale(.6);cursor:default}
  /* 방장 컨트롤 패널 (호스트 전용) */
  #hostPanel{position:absolute;left:22px;top:96px;z-index:22;
    background:rgba(11,14,20,.82);border:1px solid var(--line);border-radius:14px;
    padding:11px 12px;backdrop-filter:blur(14px);min-width:210px;max-width:240px}
  #hostPanel.hide{display:none}
  .hpTitle{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:9px;letter-spacing:.02em}
  .hpRow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .hpTeam{min-width:48px;height:30px;padding:0 8px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:12px;color:#fff;flex:0 0 auto}
  .hpTeam.red{background:#d94b4b} .hpTeam.blue{background:#2f6fd0}
  /* 공통 버튼 레이아웃: 라벨 왼쪽 + 금액 오른쪽 배지 */
  .hpBtn,.hpKing,.hpQuake,.hpBomb{display:flex;align-items:center;justify-content:space-between;gap:6px;
    font-family:inherit;cursor:pointer;color:#fff;border-radius:10px}
  .hpLabel{font-weight:800;font-size:12.5px;display:flex;align-items:center;gap:5px;white-space:nowrap}
  .hpLabel em{font-style:normal;font-weight:700;font-size:10px;opacity:.8}
  .hpCost{flex:0 0 auto;font-weight:900;font-size:11px;background:rgba(0,0,0,.28);
    border-radius:7px;padding:3px 7px;letter-spacing:.02em}
  .hpBtn{flex:1;background:rgba(255,255,255,.1);border:1px solid var(--line);padding:9px 9px}
  .hpBtn:hover{background:rgba(255,255,255,.2)} .hpBtn:active{transform:scale(.97)}
  .hpKing{width:100%;margin-top:9px;padding:11px 10px;
    background:linear-gradient(135deg,#f59e0b,#eab308);border:1px solid rgba(255,255,255,.3);
    box-shadow:0 3px 12px rgba(230,170,20,.4);color:#3a2600}
  .hpKing .hpCost{background:rgba(0,0,0,.18)}
  .hpRow .hpKing{flex:1;width:auto;margin-top:0;padding:9px 9px}
  .hpKing:hover{filter:brightness(1.08)} .hpKing:active{transform:scale(.97)}
  .hpQuake{width:100%;margin-top:7px;padding:11px 10px;
    background:linear-gradient(135deg,#7a2ff2,#c026d3);border:1px solid rgba(255,255,255,.25);
    box-shadow:0 3px 12px rgba(120,20,220,.4)}
  .hpQuake:hover{filter:brightness(1.1)} .hpQuake:active{transform:scale(.97)}
  .hpBomb{width:100%;margin-top:7px;padding:11px 10px;
    background:linear-gradient(135deg,#c0392b,#e67e22);border:1px solid rgba(255,255,255,.25);
    box-shadow:0 3px 12px rgba(200,60,20,.4)}
  .hpBomb:hover{filter:brightness(1.1)} .hpBomb:active{transform:scale(.97)}
  #verTag{position:fixed;right:10px;bottom:8px;z-index:5;
    font-size:11px;font-weight:700;color:rgba(255,255,255,.35);
    font-family:inherit;pointer-events:none;letter-spacing:.03em}
  @media (max-width:768px){
    #hostPanel{left:8px;top:auto;bottom:96px;padding:8px 9px;min-width:150px;max-width:180px}
    .hpTitle{font-size:10px;margin-bottom:6px}
    .hpTeam{min-width:40px;height:26px;font-size:10px}
    .hpLabel{font-size:11px} .hpLabel em{font-size:9px}
    .hpCost{font-size:9.5px;padding:2px 5px}
    .hpBtn{padding:7px 6px} .hpKing,.hpQuake,.hpBomb{padding:9px 8px;margin-top:6px}
  }
  @media (max-width:768px){
    #skillBar{right:8px;bottom:52px;gap:6px}
    .skillBtn{padding:9px 11px;font-size:12px}
  }
  #lobby{position:absolute;inset:0;z-index:60;
    background:#0b0e14 center top/cover no-repeat;
    display:flex;flex-direction:column;justify-content:flex-end}
  #lobby{--scrimA:0.7}
  #lobby::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(to bottom,
      rgba(11,14,20,0) 42%,
      rgba(11,14,20,calc(var(--scrimA)*0.85)) 68%,
      rgba(11,14,20,var(--scrimA)) 100%)}
  /* PC 기본: UI를 왼쪽 하단으로 */
  .card{position:relative;z-index:2;width:100%;max-width:480px;margin:0;
    padding:0 20px calc(40px + env(safe-area-inset-bottom)) 40px;
    background:none;border:none;box-shadow:none}
  #titleLogo{position:fixed;z-index:3;left:40px;top:24%;transform:none;
    width:26%;max-width:380px;pointer-events:none;
    filter:drop-shadow(0 8px 18px rgba(0,0,0,.4))}
  #logoVer{position:fixed;z-index:3;left:40px;top:calc(24% + 15vw);
    width:26%;max-width:380px;text-align:center;pointer-events:none;
    font-size:14px;font-weight:800;color:rgba(255,255,255,.55);letter-spacing:.05em}
  #lobby.editing #titleLogo{pointer-events:auto}
  #lobby.editing #titleLogo,
  #lobby.editing #stepName .opts,
  #lobby.editing #diffOpts,
  #lobby.editing #btnSoloStart,
  #lobby.editing #nick{outline:2px dashed var(--gold);outline-offset:3px;
    cursor:move;touch-action:none}
  #lobby.editing .cardInner{transform:none!important}
  .cardScrim{display:none}
  .cardInner{position:relative;z-index:4;padding:0;margin:0 auto;
    width:100%;max-width:520px;transform-origin:bottom center}
  .egrp{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.05em;
    margin:12px 0 4px;border-top:1px solid var(--line);padding-top:10px}
  .egrp:first-child{border-top:none;padding-top:0;margin-top:0}
  #editToggle{position:absolute;top:14px;right:14px;z-index:5;
    background:rgba(11,14,20,.7);color:#fff;border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;font-weight:700;font-size:13px;cursor:pointer}
  #editPanel{position:fixed;top:10px;right:10px;z-index:60;width:min(300px,90vw);
    max-height:calc(100vh - 20px);overflow-y:auto;
    background:rgba(11,14,20,.96);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;backdrop-filter:blur(10px);-webkit-overflow-scrolling:touch}
  #editPanel .er{display:flex;align-items:center;gap:10px;margin:10px 0}
  #editPanel .er span{font-size:12px;color:var(--sub);width:64px;flex:0 0 auto}
  #editPanel .er input[type=range]{flex:1;accent-color:var(--gold)}
  #editPanel .er input[type=color]{flex:1;height:32px;border:none;border-radius:8px;
    background:none;cursor:pointer;padding:0}
  .erbtns{display:flex;gap:8px;margin-top:12px}
  .erbtns button{flex:1;background:rgba(255,255,255,.08);border:1px solid var(--line);
    color:#fff;border-radius:10px;padding:9px;font-weight:700;cursor:pointer}
  #editVals{margin-top:10px;font-size:11px;color:var(--sub);word-break:break-all;line-height:1.5}
  .brand{font-size:34px;font-weight:900;letter-spacing:-1px;line-height:1;margin-bottom:6px}
  .brand .k{color:var(--gold)}
  .tag{color:var(--sub);font-size:14px;font-weight:600;margin:8px 0 22px}
  label{display:block;font-size:12px;color:var(--sub);font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;margin:20px 0 10px 2px}
  .opts{display:flex;gap:14px;margin-bottom:14px}
  #nick, #joincode{width:100%;box-sizing:border-box;display:block;margin:0 0 14px;
    background:#fffbe8;border:2px solid #7fbf00;border-radius:12px;
    padding:13px 16px;color:#153;font-size:21px;font-weight:800;font-family:inherit;
    box-shadow:0 3px 0 #7fbf00;outline:none;text-align:center}
  #nick::placeholder, #joincode::placeholder{color:#8aa06a;font-weight:700}
  #nick:focus, #joincode:focus{border-color:#5d9200;background:#ffffff}
  .opt{flex:1;background:#c6f24a;border:2px solid #7fbf00;
    border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;
    font-weight:800;font-size:21px;color:#153;transition:.15s;
    box-shadow:0 3px 0 #7fbf00}
  .opt:active{transform:translateY(2px);box-shadow:0 1px 0 #7fbf00}
  .opt.sel{background:#9fe000;border-color:#5d9200;color:#0b2a00}
  .bigbtn{background:linear-gradient(135deg,#c6f24a,#9fe000)!important;
    color:#123!important;border:2px solid #7fbf00!important;font-weight:900!important;
    font-size:23px!important;padding:14px 10px!important;box-shadow:0 4px 0 #5d9200!important}
  .bigbtn:active{transform:translateY(2px);box-shadow:0 2px 0 #5d9200!important}
  button.act{width:100%;border:none;border-radius:12px;padding:16px;font-size:17px;
    font-weight:800;font-family:inherit;cursor:pointer;color:#0b0e14;margin-top:26px;
    background:linear-gradient(135deg,var(--gold),#ffb02e);transition:transform .08s,filter .15s}
  button.act:active{transform:scale(.97)}
  button.act:hover{filter:brightness(1.08)}
  .hide{display:none!important}
  .codebox{display:flex;gap:8px;margin-bottom:6px}
  .codebox input{flex:1;min-width:0;width:100%;box-sizing:border-box;margin:0;
    text-align:center;letter-spacing:3px;font-size:22px;
    font-weight:800;text-transform:uppercase;padding-left:8px;padding-right:8px}
  .copybtn{flex:0 0 auto;width:56px;border:1px solid var(--line);
    background:rgba(255,255,255,.06);border-radius:12px;color:var(--ink);font-weight:800;cursor:pointer}
  .copybtn:active{transform:scale(.94)}
  #status{margin-top:16px;font-size:13px;color:var(--sub);font-weight:600;
    text-align:center;min-height:20px;line-height:1.5}
  #status.err{color:var(--p1)}#status.ok{color:var(--ok)}
  .small{font-size:12px;color:var(--sub);font-weight:600;margin-top:4px;line-height:1.5}
  .small b{color:var(--ink)}
  /* 대기자 목록 */
  #waitList{margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto}
  .wlEmpty{font-size:13px;color:var(--sub);text-align:center;padding:16px 0;font-weight:600}
  .wlItem{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);
    border:1px solid var(--line);border-radius:12px;padding:10px 12px}
  .wlName{flex:1;font-weight:800;font-size:15px;color:var(--ink);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .wlPick{flex:0 0 auto;background:linear-gradient(135deg,#c6f24a,#9fe000);color:#123;
    border:none;border-radius:9px;padding:9px 16px;font-weight:800;font-size:14px;
    font-family:inherit;cursor:pointer}
  .wlPick:active{transform:scale(.95)}
  .wlPick:disabled{opacity:.5;cursor:default}
  .wlDot{width:8px;height:8px;border-radius:50%;background:#4ade80;flex:0 0 auto;
    box-shadow:0 0 8px #4ade80}
  #result{position:absolute;inset:0;z-index:70;display:none;align-items:center;
    justify-content:center;background:rgba(6,8,12,.72);backdrop-filter:blur(6px)}
  #result .rcard{text-align:center;animation:pop .4s cubic-bezier(.2,1.3,.4,1)}
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  #rtitle{font-size:72px;font-weight:900;letter-spacing:-2px;text-shadow:0 8px 40px rgba(0,0,0,.6)}
  #rsub{font-size:20px;color:var(--sub);font-weight:700;margin-top:6px}
  #ragain{margin-top:28px;display:flex;gap:14px;justify-content:center}
  #ragain button{padding:14px 30px;width:auto}
  #rexitBtn{background:rgba(255,255,255,.1);border:1px solid var(--line)}
  #toast{position:absolute;top:88px;left:50%;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px 22px;font-weight:700;font-size:15px;z-index:50;backdrop-filter:blur(14px);
    opacity:0;transition:opacity .3s;pointer-events:none}
  #toast.show{opacity:1}
  /* hint 자동 숨김용 페이드 */
  #hint{transition:opacity .5s}
  #hint.faded{opacity:0}

  /* ===== 모바일 (세로 좁은 화면) ===== */
  @media (max-width:768px){
    #titleLogo{position:fixed!important;top:6%!important;left:50%!important;
      transform:translateX(-50%)!important;width:46%!important;max-width:230px;z-index:5}
    #logoVer{position:fixed!important;top:calc(6% + 26vw)!important;left:50%!important;
      transform:translateX(-50%)!important;width:46%!important;max-width:230px;font-size:12px;z-index:5}
    .codebox input{font-size:18px;letter-spacing:2px;padding-left:6px;padding-right:6px}
    .copybtn{width:48px;font-size:13px}
    /* 모바일: 카드(UI) 하단 중앙 정렬, 화면 폭 채움 */
    .card{max-width:100%!important;margin:0 auto!important;
      padding:22px 18px calc(24px + env(safe-area-inset-bottom))!important;border-radius:18px}
    #hud{padding:8px 8px}
    .player{min-width:0;gap:6px;padding:7px 9px;border-radius:12px}
    .dot{width:11px;height:11px}
    .pname{font-size:13px;max-width:80px}
    .pcount{font-size:10px}
    .pcount b{font-size:11px}
    #turnpill{padding:5px 10px;font-size:12px}
    #turnpill .swatch{width:9px;height:9px}
    #phase{font-size:8px;letter-spacing:.06em}
    /* 조작 설명: 작고 반투명하게, 하단 구석으로 */
    #hint{bottom:10px;padding:7px 12px;font-size:11px;max-width:94vw;
      background:rgba(18,22,32,0.6);line-height:1.35}
    #power{bottom:56px;width:70vw;height:10px}
    #backTop{left:8px;bottom:10px;padding:8px 10px;font-size:12px}
    .brand{font-size:26px}
    .tag{font-size:12px;margin-bottom:18px}
    .opt{padding:10px 8px;font-size:16px}
    input{padding:11px 12px;font-size:15px}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud" class="hide">
  <div class="player p1"><div class="dot"></div>
    <div class="pmeta"><div class="pname" id="p1name">플레이어</div>
    <div class="pcount">남은 알 <b id="p1count">8</b></div></div></div>
  <div id="centerbar">
    <div id="turnpill"><span class="swatch" id="turnsw"></span><span id="turntext">내 차례</span></div>
    <div id="phase">TOP VIEW</div>
  </div>
  <div class="player p2 right"><div class="dot"></div>
    <div class="pmeta"><div class="pname" id="p2name">AI</div>
    <div class="pcount">남은 알 <b id="p2count">8</b></div></div></div>
</div>
<div id="power"><div id="powerfill"></div></div>
<div id="hint" class="hide"></div>
<button id="backTop">↑ 탑뷰로</button>
<div id="hostPanel" class="hide">
  <div class="hpTitle">🎮 방장 컨트롤 (후원 연동)</div>
  <div class="hpRow">
    <span class="hpTeam blue">파랑이</span>
    <button class="hpBtn" data-skill="add" data-side="1">
      <span class="hpLabel">🥚 알 추가 <em>대왕 22%</em></span><span class="hpCost">3천원</span></button>
  </div>
  <div class="hpRow">
    <span class="hpTeam red">허호랑</span>
    <button class="hpBtn" data-skill="add" data-side="0">
      <span class="hpLabel">🥚 알 추가 <em>대왕 22%</em></span><span class="hpCost">3천원</span></button>
  </div>
  <div class="hpRow">
    <span class="hpTeam blue">파랑이</span>
    <button class="hpKing" data-skill="king" data-side="1">
      <span class="hpLabel">👑 대왕알 확정</span><span class="hpCost">3만원</span></button>
  </div>
  <div class="hpRow">
    <span class="hpTeam red">허호랑</span>
    <button class="hpKing" data-skill="king" data-side="0">
      <span class="hpLabel">👑 대왕알 확정</span><span class="hpCost">3만원</span></button>
  </div>
  <button class="hpQuake" data-skill="quake" data-side="0">
    <span class="hpLabel">💥 지진</span><span class="hpCost">만원</span></button>
  <button class="hpBomb" data-skill="bomb" data-side="0">
    <span class="hpLabel">💣 폭탄 추가</span><span class="hpCost">2천원</span></button>
</div>
<div id="toast"></div>
<div id="verTag">v1.0</div>
<div id="result"><div class="rcard">
  <div id="rtitle">WIN</div><div id="rsub"></div>
  <div id="ragain">
    <button class="act" id="rematchBtn">다시 한 판</button>
    <button class="act" id="rnextBtn" style="display:none">다음 도전자</button>
    <button class="act" id="rexitBtn">나가기</button>
  </div>
</div></div>
<div id="lobby"><div class="card" id="lobbyCard">
  <img id="titleLogo" alt="허까기">
  <div id="logoVer">v1.0</div>
  <div class="cardInner">
  <div id="stepName">
    <input id="nick" maxlength="10" placeholder="닉네임 입력" autocomplete="off">
    <div class="opts">
      <div class="opt sel" id="modeSolo">혼자 (AI)</div>
      <div class="opt" id="modeOnline">온라인 대전</div>
    </div>
    <div id="soloBox">
      <div class="opts" id="diffOpts">

/* 흰 바탕 + 하늘색 격자선 텍스처 (색상 조절 가능) */
const BOARD_COLORS={ bg:'#1e2f5a', line:'#6fc3ff', edge:'#6fc3ff' };
function boardTexture(){
  const S=1024, c=document.createElement('canvas'); c.width=c.height=S;
  const x=c.getContext('2d');
  x.fillStyle=BOARD_COLORS.bg; x.fillRect(0,0,S,S);
  const N=8, m=S*0.06, span=(S-2*m)/N;
  x.strokeStyle=BOARD_COLORS.line; x.lineWidth=3.5; x.lineCap='round';
  for(let i=0;i<=N;i++){
    const p=m+i*span;
    x.beginPath(); x.moveTo(m,p); x.lineTo(S-m,p); x.stroke();
    x.beginPath(); x.moveTo(p,m); x.lineTo(p,S-m); x.stroke();
  }
  x.strokeStyle=BOARD_COLORS.edge; x.lineWidth=9; x.strokeRect(m,m,S-2*m,S-2*m);
  x.fillStyle=BOARD_COLORS.edge;
  for(let i=0;i<=N;i++) for(let j=0;j<=N;j++){
    x.beginPath(); x.arc(m+i*span, m+j*span, 3.4, 0, Math.PI*2); x.fill();
  }
  x.strokeStyle=BOARD_COLORS.edge; x.lineWidth=5.5;
  x.beginPath(); x.moveTo(m, S/2); x.lineTo(S-m, S/2); x.stroke();
  return new THREE.CanvasTexture(c);
}

let centerLogoMesh=null;
const CENTER_CFG={ size:8, x:0, z:0, opacity:0.9 };  // 편집으로 조절
(function addCenterLogo(){
  if(CENTER_LOGO.indexOf('__')===0) return;
  const img=new Image();
  img.onload=()=>{
    const tx=new THREE.Texture(img); tx.colorSpace=THREE.SRGBColorSpace; tx.needsUpdate=true;
    const mat=new THREE.MeshBasicMaterial({map:tx, transparent:true, opacity:1.0,
      alphaTest:0.5, depthWrite:false,
      polygonOffset:true, polygonOffsetFactor:-2, polygonOffsetUnits:-2});
    centerLogoMesh=new THREE.Mesh(new THREE.PlaneGeometry(1,1),mat);
    centerLogoMesh.rotation.x=-Math.PI/2;
    // 게스트(청팀)는 판을 반대편에서 보므로 로고를 180도 돌려 똑바로 보이게
    if(typeof myPlayer!=='undefined' && myPlayer===1) centerLogoMesh.rotation.z=Math.PI;
    centerLogoMesh.position.y=0.0031;
    centerLogoMesh.renderOrder=0;
    scene.add(centerLogoMesh);
    applyCenterCfg(CENTER_CFG);
  };
  img.src=`data:image/png;base64,${CENTER_LOGO}`;
})();
function applyCenterCfg(c){
  if(!centerLogoMesh) return;
  centerLogoMesh.scale.set(c.size,c.size,1);
  centerLogoMesh.position.x=c.x; centerLogoMesh.position.z=c.z;
  centerLogoMesh.material.opacity=c.opacity;
}

/* ===== 장기 알 (원반 + 한자 느낌 상판) ===== */
function pieceTexture(color, ch){
  const S=256, c=document.createElement('canvas'); c.width=c.height=S;
  const x=c.getContext('2d');
  x.fillStyle = color==='red' ? '#e8d3a8' : '#e8d3a8';
  x.beginPath(); x.arc(S/2,S/2,S/2-6,0,Math.PI*2); x.fill();
  // 테두리 링
  x.lineWidth=10; x.strokeStyle = color==='red' ? '#b23b3b' : '#28518f';
  x.beginPath(); x.arc(S/2,S/2,S/2-14,0,Math.PI*2); x.stroke();
  x.lineWidth=4; x.strokeStyle = color==='red' ? '#8a2a2a' : '#1c3a68';
  x.beginPath(); x.arc(S/2,S/2,S/2-28,0,Math.PI*2); x.stroke();
  // 글자
  x.fillStyle = color==='red' ? '#a82c2c' : '#204a86';
  x.font='bold 150px "Noto Serif KR", serif';
  x.textAlign='center'; x.textBaseline='middle';
  x.fillText(ch, S/2, S/2+8);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}
// 장기 말 글자 (넉넉히)
const CH_RED=['楚','車','包','馬','象','士','卒','兵'];
const CH_BLUE=['漢','車','包','馬','象','士','卒','兵'];

/* ===== 커스텀 GLB 프리로드 ===== */
const loadedModels={red:null, blue:null};
let modelsReady=!CUSTOM_MODEL.use;   // 커스텀 안 쓰면 바로 준비완료
function fitModel(obj){
  // 복셀 모델: 지름(가로) 기준으로 알 크기에 맞추고 바닥 정렬
  const box=new THREE.Box3().setFromObject(obj);
  const size=new THREE.Vector3(); box.getSize(size);
  const maxXZ=Math.max(size.x,size.z)||1;
  const s=(EGG_R*2/maxXZ)*CUSTOM_MODEL.scale;
  obj.scale.setScalar(s);
  const box2=new THREE.Box3().setFromObject(obj);
  obj.position.y += -box2.min.y + CUSTOM_MODEL.yOffset;   // 바닥이 y=0
  obj.traverse(o=>{
    if(o.isMesh && o.material){
      o.castShadow=true; o.receiveShadow=true;
      const m=o.material;
      if(m.map){
        m.map.colorSpace=THREE.SRGBColorSpace;
        m.map.anisotropy=8;                 // 비스듬히 봐도 선명
        m.vertexColors=false;
        // 텍스처를 자체발광에도 써서 위에서 봐도 밝게
        m.emissiveMap=m.map;
        m.emissive=new THREE.Color(0xffffff);
        m.emissiveIntensity=0.12;
      }
      else if(o.geometry && o.geometry.attributes && o.geometry.attributes.color){ m.vertexColors=true; }
      m.roughness=0.45; m.metalness=0.0;
      m.needsUpdate=true;
    }
  });
  return obj;
}
function preloadModels(cb){
  if(!CUSTOM_MODEL.use){ cb(); return; }
  const loader=new GLTFLoader(); let done=0;
  const finish=()=>{ if(++done>=2){ modelsReady=true; cb(); } };
  loader.load(CUSTOM_MODEL.redUrl, g=>{ loadedModels.red=fitModel(g.scene); finish(); },
    undefined, e=>{ console.warn('red model load fail',e); finish(); });
  loader.load(CUSTOM_MODEL.blueUrl, g=>{ loadedModels.blue=fitModel(g.scene); finish(); },
    undefined, e=>{ console.warn('blue model load fail',e); finish(); });
}

function makeEgg(color, side, idx, szMul){
  szMul = szMul || 1.0;
  const g=new THREE.Group();
  const isRed = side===0;
  const sideCol = isRed?COL1:COL2;
  const radius = EGG_R*szMul;   // 이 알의 실제 물리 반지름
  // 알별 질량: 크기가 클수록 무겁게. 단, 상한을 둬서 대왕알도 잘 밀고 나가게.
  // 원반 알의 질량 = 면적에 비례(반지름²). 자연스러운 무게 관계.
  const mass = szMul*szMul;

  const customSrc = isRed? loadedModels.red : loadedModels.blue;
  if(CUSTOM_MODEL.use && customSrc){
    // ▼ 커스텀 3D 모델 사용
    const model=customSrc.clone(true);
    // 각 진영이 상대를 바라보게: 홍(side0, +z진영)은 -z를 향하도록 180도 회전
    model.rotation.y = isRed ? Math.PI : 0;
    g.add(model);
    // 선택 표시 링 (원반 살짝 위)
    const sel=new THREE.Mesh(new THREE.TorusGeometry(EGG_R*1.25,0.06,12,44),
      new THREE.MeshBasicMaterial({color:0xffe27a}));
    sel.rotation.x=-Math.PI/2; sel.position.y=0.12; sel.visible=false; g.add(sel);
    g.scale.setScalar(szMul);   // 알 전체 크기 조절
    g.userData={vx:0,vz:0,alive:true,side,idx,body:model,ring:sel,color:sideCol,radius,mass,szMul};
    scene.add(g); return g;
  }

  // ▼ 기본 장기 원반 알
  const body=new THREE.Mesh(new THREE.CylinderGeometry(EGG_R,EGG_R*0.94,EGG_H,40),
    new THREE.MeshStandardMaterial({color:0xe8d3a8,roughness:0.5,metalness:0.05}));
  body.castShadow=true; body.receiveShadow=true; g.add(body);
  const ringSide=new THREE.Mesh(new THREE.CylinderGeometry(EGG_R*1.005,EGG_R*0.95,EGG_H*0.5,40,1,true),
    new THREE.MeshStandardMaterial({color:sideCol,roughness:0.5,side:THREE.DoubleSide}));
  ringSide.position.y=0; g.add(ringSide);
  const chList = isRed?CH_RED:CH_BLUE;
  const capTex = pieceTexture(isRed?'red':'blue', chList[idx%chList.length]);
  const cap=new THREE.Mesh(new THREE.CircleGeometry(EGG_R*0.96,40),
    new THREE.MeshStandardMaterial({map:capTex,roughness:0.55}));
  cap.rotation.x=-Math.PI/2; cap.position.y=EGG_H/2+0.002; g.add(cap);
  const sel=new THREE.Mesh(new THREE.TorusGeometry(EGG_R*1.3,0.06,12,44),
    new THREE.MeshBasicMaterial({color:0xffe27a}));
  sel.rotation.x=-Math.PI/2; sel.position.y=EGG_H/2+0.05; sel.visible=false; g.add(sel);
  g.scale.setScalar(szMul);
  g.userData={vx:0,vz:0,alive:true,side,idx,body,ring:sel,color:sideCol,radius,mass,szMul};
  scene.add(g); return g;
}
let eggs=[];

/* 폭탄알: 중립(side=-1). 판 밖으로 밀려나면 터지며 주변 알을 밀쳐냄. */
const BOMB_R=0.72, BOMB_MASS=1.4;
function makeBomb(x,z){
  const g=new THREE.Group();
  const ball=new THREE.Mesh(new THREE.SphereGeometry(BOMB_R,28,20),
    new THREE.MeshStandardMaterial({color:0x222222,roughness:0.4,metalness:0.3,
      emissive:0x551100,emissiveIntensity:0.4}));
  ball.castShadow=true; g.add(ball);
  const fuse=new THREE.Mesh(new THREE.SphereGeometry(BOMB_R*0.22,10,8),
    new THREE.MeshBasicMaterial({color:0xffcc33}));
  fuse.position.y=BOMB_R*0.95; g.add(fuse);
  const baseY=CUSTOM_MODEL.use?0:EGG_H/2;
  g.position.set(x, baseY+BOMB_R*0.3, z);
  g.userData={vx:0,vz:0,alive:true,side:-1,idx:99,body:ball,fuse,
    color:0xff3300,radius:BOMB_R,mass:BOMB_MASS,szMul:1,isBomb:true};
  scene.add(g); return g;
}

function layoutEggs(){
  eggs.forEach(e=>scene.remove(e)); eggs=[];
  // 뒷줄 5 + 앞줄 3. 각 자리에 크기 인덱스를 매핑(중앙=가장 큼)
  // 뒷줄 x좌표(넓게):        중앙0    안쪽1,2      바깥3,4
  const backX  = [ 0, -5, 5, -10, 10 ];   // idx 순서와 대응
  const backSz = [ 0,  1, 1,   3,  3 ];   // EGG_SIZES 인덱스
  // 앞줄 x좌표:              중앙        좌우
  const frontX  = [ 0, -7, 7 ];
  const frontSz = [ 5,  6, 6 ];           // (남은 크기: 5,6,6) — 7번(가장 작음)은 안 씀
  const zBack = HALF-2.2, zFront = HALF-6.0;
  const baseY = CUSTOM_MODEL.use ? 0 : EGG_H/2;

  function place(side){
    let uidRun=0;
    backX.forEach((x,k)=>{
      const sz=EGG_SIZES[backSz[k]];
      const e=makeEgg(null,side,k,sz);
      e.position.set(x,baseY, side===0?zBack:-zBack); eggs.push(e);
    });
    frontX.forEach((x,k)=>{
      const sz=EGG_SIZES[frontSz[k]];
      const e=makeEgg(null,side,5+k,sz);
      e.position.set(x,baseY, side===0?zFront:-zFront); eggs.push(e);
    });
  }
  place(0); place(1);
  // 중립 폭탄알 2개: 판 중앙 영역에 랜덤 배치 (서로 너무 붙지 않게)
  const bx1 = -8 + Math.random()*6;          // 왼쪽 절반
  const bx2 =  2 + Math.random()*6;          // 오른쪽 절반
  const bz1 = (Math.random()*2-1)*5;         // 중앙 z 띠
  const bz2 = (Math.random()*2-1)*5;
  eggs.push(makeBomb(bx1, bz1));
  eggs.push(makeBomb(bx2, bz2));
}

/* 조준 화살표: 납작한 3D 입체 화살표 (빨강) */
const aimGroup=new THREE.Group(); aimGroup.visible=false; aimGroup.renderOrder=999; scene.add(aimGroup);
function makeArrowShape(){
  const s=new THREE.Shape();
  const bw=0.16, hw=0.42, hl=0.5;
  s.moveTo(-bw, 0);
  s.lineTo(-bw, 1-hl);
  s.lineTo(-hw, 1-hl);
  s.lineTo(0, 1);
  s.lineTo(hw, 1-hl);
  s.lineTo(bw, 1-hl);
  s.lineTo(bw, 0);
  s.closePath();
  return s;
}
// 두께를 준 입체 화살표
const arrowGeo=new THREE.ExtrudeGeometry(makeArrowShape(), {depth:0.22, bevelEnabled:true, bevelThickness:0.05, bevelSize:0.04, bevelSegments:2});
arrowGeo.translate(0,0,-0.11);   // 두께 중심 맞춤
const arrowMat=new THREE.MeshStandardMaterial({color:0xff2b2b, roughness:0.4, metalness:0.05,
  emissive:0xff2b2b, emissiveIntensity:0.25});
const arrowMesh=new THREE.Mesh(arrowGeo, arrowMat);
arrowMesh.renderOrder=999;
aimGroup.add(arrowMesh);

const CAM={mode:'top'};
let camPos=new THREE.Vector3(0,42,0.01), camLook=new THREE.Vector3(0,0,0);

// ===== 화면 흔들림 & 폭발 파티클 =====
let shakeAmt=0;
function shake(amt){ shakeAmt=Math.max(shakeAmt, amt); }
let particles=[];
const particleGeo=new THREE.SphereGeometry(0.18,6,5);
function spawnParticles(x,z){
  for(let i=0;i<16;i++){
    const m=new THREE.Mesh(particleGeo,
      new THREE.MeshBasicMaterial({color:i%2?0xff7722:0xffcc33}));
    m.position.set(x, 1.0, z);
    scene.add(m);
    const a=Math.random()*Math.PI*2, sp=0.15+Math.random()*0.25;
    particles.push({mesh:m, vx:Math.cos(a)*sp, vy:0.12+Math.random()*0.18,
      vz:Math.sin(a)*sp, life:1});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.mesh.position.x+=p.vx; p.mesh.position.z+=p.vz;
    p.mesh.position.y+=p.vy; p.vy-=0.02;
    p.life-=0.04;
    p.mesh.scale.setScalar(Math.max(p.life,0.01));
    if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); }
  }
}

// ===== 스킬 (알 5개 추가 / 지진) =====
// add: 내 진영에 알 5개 추가(확률로 대왕알). quake: 즉발 랜덤 충격.
const KING_MULT = 4 * EGG_SIZES[0];   // 제일 큰 알(EGG_SIZES[0])의 4배
const KING_CHANCE = 0.22;             // 대왕알 등장 확률
let skillUsed={add:false, quake:false, king:false, bomb:false};
function resetSkills(){
  skillUsed={add:false, quake:false, king:false, bomb:false};
}
function applyQuake(){
  showToast('💥 지진 발생!');
  shake(0.7);
  for(const e of eggs){
    const u=e.userData; if(!u.alive) continue;
    const a=Math.random()*Math.PI*2, f=(0.35+Math.random()*0.4)/Math.pow(u.mass||1,0.7);
    u.vx+=Math.cos(a)*f; u.vz+=Math.sin(a)*f;
  }
  moving=true;
}
// specs: [{x,z,sz,king}, ...] 를 받아 양쪽이 동일하게 생성
function applyAddEggs(side, specs){
  const baseY = CUSTOM_MODEL.use ? 0 : EGG_H/2;
  let king=false;
  specs.forEach((sp,i)=>{
    const e=makeEgg(null, side, 90, sp.sz);
    e.position.set(sp.x, baseY+14, sp.z);   // 위에서 시작
    if(sp.king){ king=true; e.userData.isKing=true; }
    // 낙하 애니메이션 상태: 시간차로 툭툭 떨어지게
    e.userData.drop={ groundY:baseY, vy:0, delay:i*0.08, bounced:0 };
    eggs.push(e);
  });
  assignUids();
  updateHUD();
  showToast(king ? '👑 대왕알 등장!!' : '🥚 알 5개 추가!');
  if(king) shake(0.4);
}
// 폭탄 1개를 낙하로 추가(양쪽 동일 생성)
function applyAddBomb(bx, bz){
  const baseGroundY = (CUSTOM_MODEL.use?0:EGG_H/2) + BOMB_R*0.3;
  const e=makeBomb(bx, bz);
  e.position.y = baseGroundY + 14;   // 위에서 시작
  e.userData.drop={ groundY:baseGroundY, vy:0, delay:0, bounced:0 };
  eggs.push(e);
  assignUids();
  showToast('💣 폭탄 등장!');
  shake(0.25);
}
// 낙하 애니메이션: tick에서 매 프레임 호출
function tickDrops(){
  for(const e of eggs){
    const d=e.userData.drop; if(!d) continue;
    if(d.delay>0){ d.delay-=0.016; continue; }
    d.vy -= 0.055;                       // 중력
    e.position.y += d.vy;
    e.rotation.y += 0.14;                // 떨어지며 수직축으로 빙글(눕지 않음)
    if(e.position.y<=d.groundY){
      e.position.y=d.groundY;
      if(d.bounced<2 && Math.abs(d.vy)>0.12){
        d.vy=-d.vy*0.42; d.bounced++;    // 착지 튕김
        if(d.bounced===1) shake(0.12);
      } else {
        e.position.y=d.groundY;
        e.rotation.x=0; e.rotation.z=0;  // 착지 시 정면(똑바로)으로 복구
        delete e.userData.drop;          // 낙하 종료
      }
    }
  }
}
function useSkill(name, targetSide, opts){
  opts = opts || {};
  const force = !!opts.force;           // 호스트/후원: 사용 제한 무시
  if(!gameActive) return;
  // 대상 팀: 지정 없으면 내 팀
  const side = (targetSide===0||targetSide===1) ? targetSide : myPlayer;
  // 일반 버튼(force 아님)은 판당 1회 제한
  if(!force){
    if(skillUsed[name]) return;
    skillUsed[name]=true;
  }
  if(name==='add' || name==='king'){
    // add: 5개 추가(확률로 대왕알). king: 대왕알 100% 확정.
    const guaranteedKing = (name==='king');
    const zBase = (side===0)? (HALF-5.5) : -(HALF-5.5);
    const kingIdx = guaranteedKing ? Math.floor(Math.random()*5)
                                   : (Math.random()<KING_CHANCE ? Math.floor(Math.random()*5) : -1);
    const specs=[];
    const kingR = EGG_R*KING_MULT;   // 대왕알 반지름
    for(let k=0;k<5;k++){
      const king = (k===kingIdx);
      if(king){
        specs.push({x:0, z: (side===0)? (HALF-kingR-0.6) : -(HALF-kingR-0.6), sz:KING_MULT, king:true});
      } else {
        const x = -12 + k*6 + (Math.random()*2-1);
        const z = zBase + (Math.random()*2-1);
        specs.push({x, z, sz:1.0, king:false});
      }
    }
    applyAddEggs(side, specs);
    if(!soloMode) net.send({t:'skill', name:'add', side, specs});
  } else if(name==='quake'){
    // 지진은 판 전체(팀 무관)
    if(isPhysicsOwner()) applyQuake();
    if(!soloMode) net.send({t:'skill', name:'quake'});
  } else if(name==='bomb'){
    // 폭탄 1개를 판 랜덤 위치에 낙하로 추가(팀 무관)
    const bx = (Math.random()*2-1)*9;
    const bz = (Math.random()*2-1)*9;
    applyAddBomb(bx, bz);
    if(!soloMode) net.send({t:'skill', name:'bomb', bx, bz});
  }
}


let camPosTarget=camPos.clone(), camLookTarget=camLook.clone();
let topPanX=0, topPanZ=0, topZoom=42;   // 탑뷰 카메라 이동/줌
function setTopView(){
  CAM.mode='top';
  // 게스트(청)는 반대편에서 내려다봐 자기 알이 화면 아래로
  const flip = (myPlayer===1)? -1 : 1;
  camera.up.set(0,0,flip===1?-1:1);
  camPosTarget.set(topPanX, topZoom, 0.01*flip + topPanZ);
  camLookTarget.set(topPanX, 0, topPanZ);
  aimGroup.visible=false;
  phaseEl.textContent='TOP VIEW';

function setEggView(){
  CAM.mode='egg'; camera.up.set(0,1,0);
  phaseEl.textContent='EGG VIEW';
  backTopBtn.style.display=selectedEgg?'block':'none';
  updateEggCamera();
}
/* 조준 방향 dir = (sin, cos). 카메라는 알보다 -dir쪽(뒤)에 두고 +dir(앞)을 바라봄
   => 카메라가 보는 방향과 화살표(발사 방향)가 정확히 일치 */
function updateEggCamera(){
  if(!selectedEgg) return;
  const p=selectedEgg.position;
  const dir=new THREE.Vector2(Math.sin(aimAngle),Math.cos(aimAngle));
  const camH = CUSTOM_MODEL.use ? 3.4 : 2.6;   // 캐릭터가 크면 시점 조금 높게
  const lookH = CUSTOM_MODEL.use ? 1.2 : 0.6;
  camPosTarget.set(p.x-dir.x*4.6, camH, p.z-dir.y*4.6);
  camLookTarget.set(p.x+dir.x*6.0, lookH, p.z+dir.y*6.0);
}

let currentTurn=0, selectedEgg=null, aimAngle=0;
let charging=false, chargeStart=0, chargePower=0, moving=false, gameActive=false;
let shooterUid=null;   // 이번 턴에 발사한 알 uid (자멸 판정용)
let names=['홍','청'];
// 온라인 상태
let myPlayer=0;   // 0=호스트(홍), 1=게스트(청)
let isHost=false;
let soloMode=false;   // true면 AI 대전(혼자)
let difficulty=1;

const raycaster=new THREE.Raycaster();
const pointer=new THREE.Vector2();
const $=id=>document.getElementById(id);
const phaseEl=$('phase'), backTopBtn=$('backTop');

// 내 차례일 때만 조작 가능
function humanControls(){ return currentTurn===myPlayer; }
// 물리 계산 주인: 솔로이거나 온라인 호스트
function isPhysicsOwner(){ return soloMode || isHost; }

function updateHUD(){
  const c=[0,0]; eggs.forEach(e=>{ if(e.userData.alive && e.userData.side>=0) c[e.userData.side]++; });
  $('p1count').textContent=c[0]; $('p2count').textContent=c[1];
  $('p1name').textContent=names[0]; $('p2name').textContent=names[1];
  $('turnsw').style.background=currentTurn===0?'#d94b4b':'#2f6fd0';
  $('turntext').textContent = (currentTurn===myPlayer)
    ? `내 차례 (${names[currentTurn]})` : `${names[currentTurn]} 차례`;
  return c;
}
function checkWin(){
  const c=updateHUD();
  if(c[0]===0||c[1]===0){
    gameActive=false;
    const winner=c[0]===0?1:0;
    showResult(winner);
    if(isHost) net.send({t:'win', winner});
    return true;
  }
  return false;
}

function pickEgg(cx,cy){
  const r=renderer.domElement.getBoundingClientRect();
  pointer.x=((cx-r.left)/r.width)*2-1; pointer.y=-((cy-r.top)/r.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const alive=eggs.filter(e=>e.userData.alive);
  // 알 그룹 전체를 recursive 검사 (커스텀 모델은 하위 메시가 많음)
  const hits=raycaster.intersectObjects(alive,true);
  if(!hits.length) return null;
  // 맞은 메시에서 위로 올라가 eggs에 속한 루트 그룹을 찾음
  let o=hits[0].object;
  while(o){
    if(o.userData && o.userData.side!==undefined && o.userData.alive!==undefined) return o;
    o=o.parent;
  }
  return null;
}
function selectEgg(egg){
  if(selectedEgg) selectedEgg.userData.ring.visible=false;
  selectedEgg=egg; egg.userData.ring.visible=true; aimGroup.visible=true;
  aimAngle = myPlayer===0? Math.PI : 0;  // 홍은 -z(상대), 청은 +z
  setEggView();
  setHint('<b>좌우 드래그</b>로 조준 · <b>화면을 꾹 눌렀다 떼면</b> 파워만큼 발사');
}

let pressing=false, dragStartX=0, aimStartAngle=0, didDrag=false;
// 모바일 전용: 화면 끝까지 드래그했을 때만 추가로 천천히 회전
let aimIsTouch=false, aimEdgeAdd=0, aimEdgeVel=0;
let topDragging=false, topDragX=0, topDragY=0, topStartPanX=0, topStartPanZ=0;
renderer.domElement.addEventListener('pointerdown', e=>{
  try{ renderer.domElement.setPointerCapture(e.pointerId); }catch(_){}
  // 탑뷰 카메라 이동(팬)은 언제든 가능 (내 턴 아니어도, 알 움직이는 중에도)
  if(CAM.mode==='top'){
    const canSelect = gameActive && !moving && humanControls();
    const egg = canSelect ? pickEgg(e.clientX,e.clientY) : null;
    if(egg && egg.userData.side===myPlayer){ selectEgg(egg); return; }
    // 빈 곳(또는 선택 불가 상태) → 카메라 이동 시작
    topDragging=true; topDragX=e.clientX; topDragY=e.clientY;
    topStartPanX=topPanX; topStartPanZ=topPanZ;
    return;
  }
  if(!gameActive||moving||!humanControls()) return;
  if(!selectedEgg) return;
  pressing=true; didDrag=false; dragStartX=e.clientX; aimStartAngle=aimAngle;
  aimIsTouch=(e.pointerType==='touch'); aimEdgeAdd=0; aimEdgeVel=0;
  charging=true; chargeStart=performance.now(); chargePower=0;
  $('power').style.display='block';
});
renderer.domElement.addEventListener('pointermove', e=>{
  if(CAM.mode==='top' && topDragging){
    const flip=(myPlayer===1)?-1:1;
    const k=0.055;   // 이동 감도 (높일수록 많이 움직임)
    topPanX = topStartPanX - (e.clientX-topDragX)*k*flip;
    topPanZ = topStartPanZ - (e.clientY-topDragY)*k*flip;
    const lim=22;   // 이동 가능 범위
    topPanX=Math.max(-lim,Math.min(lim,topPanX));
    topPanZ=Math.max(-lim,Math.min(lim,topPanZ));
    setTopView();
    return;
  }
  if(!pressing||!selectedEgg) return;
  const dx=e.clientX-dragStartX;
  if(Math.abs(dx)>4) didDrag=true;
  aimAngle=aimStartAngle - dx*0.006 + aimEdgeAdd; updateEggCamera();

    const w=window.innerWidth, EDGE=36;   // 진짜 끝(36px)에 닿아야 발동

    else if(e.clientX>w-EDGE)     aimEdgeVel = -0.0055;   // 오른쪽 끝 → 오른쪽으로 계속

function fireSelected(){
  if(!selectedEgg) return;
  const dir=new THREE.Vector2(Math.sin(aimAngle),Math.cos(aimAngle));
  const sz=selectedEgg.userData.szMul||1;
  // 임펄스 모델(자연스러움 + 시원함 절충):
  // 손가락 임펄스는 크기^1.5에 비례, 속도 = 임펄스/질량(sz²) = 1/√sz.
  // → 큰 알은 묵직하게 느리지만 끝까지 굴러가고, 작은 알은 날쌔게 튐.
  const kingBoost = selectedEgg.userData.isKing ? 1.7 : 0.8;   // 대왕알은 강력, 일반알은 20% 감소
  const impulse = Math.min(chargePower,1)*MAX_POWER*Math.pow(sz,1.5)*kingBoost;
  const power = impulse/(sz*sz);
  const uid=selectedEgg.userData.uid, vx=dir.x*power, vz=dir.y*power;
  if(isPhysicsOwner()){
    // 솔로 또는 호스트: 직접 물리에 적용
    applyShot(uid, vx, vz);
  } else {
    // 온라인 게스트: 호스트에게 발사 요청만 전송
    net.send({t:'shot', uid, vx, vz});
    selectedEgg.userData.ring.visible=false;
    selectedEgg=null; aimGroup.visible=false; moving=true; setTopView();
  }
  charging=false; chargePower=0; $('power').style.display='none'; $('powerfill').style.width='0%';
}
function applyShot(uid, vx, vz){
  // 호스트에서만 실제 물리 발사가 일어남
  const egg=eggs.find(e=>e.userData.uid===uid && e.userData.alive);
  if(!egg) return;
  egg.userData.vx=vx; egg.userData.vz=vz; egg.userData.ring.visible=false;
  shooterUid=uid;
  selectedEgg=null; aimGroup.visible=false; moving=true; setTopView();
}

function physics(){
  // 물리 주인(솔로/호스트)만 계산. 온라인 게스트는 받은 위치만 렌더
  if(!isPhysicsOwner()) return;
  let any=false;
  for(const e of eggs){
    const u=e.userData; if(!u.alive) continue;
    if(Math.abs(u.vx)>STOP_V||Math.abs(u.vz)>STOP_V){
      e.position.x+=u.vx; e.position.z+=u.vz;
      // 마찰 감속은 질량과 무관하게 동일(자연법칙). 무게감은 발사·충돌에서 나옴.
      u.vx*=FRICTION; u.vz*=FRICTION; any=true;
      e.rotation.y+=(u.vx+u.vz)*0.12;
    } else { u.vx=0; u.vz=0; }
  }
  for(let i=0;i<eggs.length;i++){
    const a=eggs[i].userData; if(!a.alive) continue;
    for(let j=i+1;j<eggs.length;j++){
      const b=eggs[j].userData; if(!b.alive) continue;
      // 낙하 중인 알은 착지 전까지 충돌 제외
      if(a.drop || b.drop) continue;
      const dx=eggs[j].position.x-eggs[i].position.x, dz=eggs[j].position.z-eggs[i].position.z;
      const d=Math.hypot(dx,dz);
      const min=(a.radius||EGG_R)+(b.radius||EGG_R);
      if(d>0 && d<min){
        // 폭탄은 닿기만 하면 즉발
        if(a.isBomb || b.isBomb){
          const bombEgg = a.isBomb ? eggs[i] : eggs[j];
          if(bombEgg.userData.alive){
            explodeBomb(bombEgg);
            bombEgg.userData.alive=false; bombEgg.userData.vx=0; bombEgg.userData.vz=0;
            bombEgg.position.y=-20; bombEgg.visible=false;
            broadcastState(true);
          }
          continue;
        }
        const nx=dx/d, nz=dz/d, ov=min-d;
        const ma=(a.mass||1), mb=(b.mass||1), mt=ma+mb;
        eggs[i].position.x-=nx*ov*(mb/mt); eggs[i].position.z-=nz*ov*(mb/mt);
        eggs[j].position.x+=nx*ov*(ma/mt); eggs[j].position.z+=nz*ov*(ma/mt);
        const rvx=b.vx-a.vx, rvz=b.vz-a.vz, vn=rvx*nx+rvz*nz;
        if(vn<0){
          const J=-(1+REST)*vn/(1/ma+1/mb);
          a.vx-=J*nx/ma; a.vz-=J*nz/ma;
          b.vx+=J*nx/mb; b.vz+=J*nz/mb;
          any=true;
        }
      }
    }
  }
  for(const e of eggs){
    const u=e.userData; if(!u.alive) continue;
    if(Math.abs(e.position.x)>HALF+0.1||Math.abs(e.position.z)>HALF+0.1){
      if(u.isBomb){
        explodeBomb(e);
        u.alive=false; u.vx=0; u.vz=0; e.position.y=-20; e.visible=false; broadcastState(true);
      } else {
        const isSelf=(u.uid===shooterUid);
        u.alive=false; u.vx=0; u.vz=0; dropEgg(e, isSelf); broadcastState(true);
      }
    }
  }
  // 알이 움직이는 동안 주기적으로 상태 전송(온라인 호스트만)
  if(any && !soloMode) broadcastState(false);
  if(moving && !any){
    moving=false;
    if(!soloMode) broadcastState(true);
    if(!checkWin()){
      endTurn();
      if(!soloMode) net.send({t:'turn', currentTurn});
      // 솔로: AI 차례면 자동으로 둠
      if(soloMode && currentTurn===1){ setHint('<b>AI</b>가 조준 중…'); setTimeout(aiTurn, 800); }
    }
  }
}
// 호스트 -> 게스트: 알 위치/생존 상태 전송 (초당 33회 제한, 정수 배열로 압축)
let lastBroadcast=0;
function broadcastState(force){
  if(!isHost || !net.conn || !net.conn.open) return;
  const now=performance.now();
  if(!force && now-lastBroadcast<30) return;   // 30ms ≈ 33fps
  lastBroadcast=now;
  // 위치를 정수(x100)로 압축한 평면 배열: [x,z,ry,a, x,z,ry,a, ...]
  // y는 낙사 때만 필요하므로 alive=0일 때만 별도 처리
  const arr=[];
  for(const e of eggs){
    arr.push(Math.round(e.position.x*50));
    arr.push(Math.round(e.position.z*50));
    arr.push(Math.round(e.rotation.y*100));
    arr.push(e.userData.alive?1:0);
    arr.push(Math.round(e.position.y*50));
  }
  net.send({t:'st', a:arr, m:moving?1:0});
}
function explodeBomb(bomb){
  showToast('💥 폭탄 폭발!');
  shake(0.5);
  const bx=bomb.position.x, bz=bomb.position.z;
  const RANGE=9, FORCE=0.9;
  for(const e of eggs){
    const u=e.userData; if(!u.alive || e===bomb) continue;
    const dx=e.position.x-bx, dz=e.position.z-bz;
    const d=Math.hypot(dx,dz)||0.001;
    if(d<RANGE){
      const f=FORCE*(1-d/RANGE)/Math.pow(u.mass||1,0.7);
      u.vx += (dx/d)*f; u.vz += (dz/d)*f;
    }
  }
  spawnParticles(bx, bz);
}
function dropEgg(e, isSelf){
  if(isSelf) showToast(`💀 ${names[e.userData.side]} 자멸!`);
  else showToast(`${names[e.userData.side]} 알 아웃!`);
  if(!isPhysicsOwner()) return;   // 온라인 게스트는 호스트 state의 y를 그대로 사용
  let t=0;
  const fall=()=>{ t+=0.016; e.position.y-=0.10*(1+t*4); e.rotation.x+=0.3;
    if(e.position.y>-8){ requestAnimationFrame(fall); broadcastState(false); } else e.visible=false; };
  fall();
}
function endTurn(){

// 솔로 AI: 청팀(1)이 가장 가까운 내 알을 조준해 발사
function aiTurn(){
  if(!gameActive || !soloMode || currentTurn!==1) return;
  const myEggs=eggs.filter(e=>e.userData.alive && e.userData.side===1);
  const foes=eggs.filter(e=>e.userData.alive && e.userData.side===0);
  if(!myEggs.length||!foes.length) return;
  let best=null, bestD=Infinity;
  for(const m of myEggs) for(const f of foes){
    const d=Math.hypot(f.position.x-m.position.x, f.position.z-m.position.z);
    if(d<bestD){ bestD=d; best={m,f}; }
  }
  const {m,f}=best;
  let ang=Math.atan2(f.position.x-m.position.x, f.position.z-m.position.z);
  const errs=[0.20,0.09,0.03];
  ang += (Math.random()*2-1)*errs[difficulty];
  const need=Math.min(bestD/BOARD,1);
  const powBase=[0.55,0.72,0.9][difficulty];
  const charge=Math.min(powBase*0.5 + need*0.7 + Math.random()*0.1, 1);
  const sz=m.userData.szMul||1;
  const kb = m.userData.isKing ? 1.7 : 0.8;
  const pow=charge*MAX_POWER*Math.pow(sz,1.5)/(sz*sz)*kb;   // 임펄스 모델 + 대왕알 부스트
  const dir=new THREE.Vector2(Math.sin(ang),Math.cos(ang));
  applyShot(m.userData.uid, dir.x*pow, dir.y*pow);
}

function tick(){
  requestAnimationFrame(tick);
  if(charging){
    const held=(performance.now()-chargeStart)/1000;
    // 계속 누르면 0→100→0→100 반복(핑퐁). 타이밍 맞춰 떼기.
    const phase=(held/CHARGE_T)%2;
    chargePower=phase<=1 ? phase : (2-phase);
    $('powerfill').style.width=(chargePower*100)+'%';
    // 풀차지 근처면 게이지 강조(빨강)
    $('powerfill').style.filter = chargePower>0.9 ? 'brightness(1.3) saturate(1.4)' : 'none';
  }
  physics();
  // 게스트: 받은 목표 위치로 부드럽게 보간 (렉 완화)
  if(!isHost){
    for(const e of eggs){
      const t=e.userData.tgt; if(!t) continue;
      if(e.userData.drop) continue;   // 낙하 애니 중엔 보간 생략
      const dx=t.x-e.position.x, dz=t.z-e.position.z, dy=t.y-e.position.y;
      const dist=Math.hypot(dx,dz);
      // 목표와 아주 가까우면 스냅(미세 떨림 방지), 멀면 부드럽게 따라감
      const k = dist>3 ? 0.5 : 0.28;
      e.position.x += dx*k; e.position.z += dz*k; e.position.y += dy*0.4;
      let dr=t.ry-e.rotation.y;
      while(dr> Math.PI) dr-=Math.PI*2;
      while(dr<-Math.PI) dr+=Math.PI*2;
      e.rotation.y += dr*0.3;
    }
  }
  if(selectedEgg && aimGroup.visible){
    const p=selectedEgg.position;
    const len=1.8+chargePower*3.4;
    const sz=selectedEgg.userData.szMul||1;
    const baseY=(CUSTOM_MODEL.use ? 0.05 : EGG_H/2) + 0.12;
    const dir=new THREE.Vector3(Math.sin(aimAngle),0,Math.cos(aimAngle)).normalize();
    // 말 앞쪽으로 더 멀리 띄움
    const startGap=(selectedEgg.userData.radius||EGG_R)*1.4 + 1.6;
    const start=new THREE.Vector3(p.x+dir.x*startGap, baseY, p.z+dir.z*startGap);
    function place(mesh, wBoost, lBoost){
      mesh.position.copy(start);
      const qLay=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), -Math.PI/2);
      const yaw=Math.atan2(dir.x, dir.z)+Math.PI;   // 방향 반전(정반대 교정)
      const qYaw=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yaw);
      mesh.quaternion.copy(qYaw.multiply(qLay));
      mesh.scale.set(wBoost, len*lBoost, 1);
    }
    place(arrowMesh, 1, 1);
    if(CAM.mode==='egg') updateEggCamera();
  }
  // 모바일: 화면 끝에 손가락을 대고 있는 동안만 천천히 추가 회전
  if(pressing && selectedEgg && aimIsTouch && aimEdgeVel!==0){
    aimEdgeAdd += aimEdgeVel;
    aimAngle   += aimEdgeVel;
    updateEggCamera();
  }
  camPos.lerp(camPosTarget,0.12); camLook.lerp(camLookTarget,0.12);
  camera.position.copy(camPos); camera.lookAt(camLook);
  // 화면 흔들림
  if(shakeAmt>0.001){
    camera.position.x += (Math.random()*2-1)*shakeAmt;
    camera.position.z += (Math.random()*2-1)*shakeAmt;
    shakeAmt *= 0.88;
  }
  updateParticles();
  tickDrops();
  renderer.render(scene,camera);
}

  $('soloBox').classList.remove('hide'); $('onlineBox').classList.add('hide'); setStatus('');
});
$('modeOnline').addEventListener('click',()=>{
  $('modeOnline').classList.add('sel'); $('modeSolo').classList.remove('sel');
  $('onlineBox').classList.remove('hide'); $('soloBox').classList.add('hide'); setStatus('');
  if(typeof applyOffsets==='function') applyOffsets();
});
/* 난이도 */
document.querySelectorAll('#diffOpts .opt').forEach(o=>o.addEventListener('click',()=>{
  document.querySelectorAll('#diffOpts .opt').forEach(x=>x.classList.remove('sel'));
  o.classList.add('sel'); difficulty=+o.dataset.diff;
}));
/* 솔로 시작 */
$('btnSoloStart').addEventListener('click',()=>{
  const nick=getNick(); if(!nick) return;
  soloMode=true; isHost=false; myPlayer=0;
  names=[nick,'AI'];
  beginMatch();
});

$('btnShowJoin').addEventListener('click',()=>{
  if(!getNick()) return;
  $('stepName').classList.add('hide'); $('stepJoin').classList.remove('hide'); setStatus('');
});
$('btnBackName').addEventListener('click',()=>{
  $('stepJoin').classList.add('hide'); $('stepName').classList.remove('hide'); setStatus('');
});
$('btnCancelHost').addEventListener('click',()=>location.reload());
$('btnCopy').addEventListener('click',()=>{
  navigator.clipboard&&navigator.clipboard.writeText($('roomcode').value);
  $('btnCopy').textContent='완료'; setTimeout(()=>$('btnCopy').textContent='복사',1200);
});

$('btnCreate').addEventListener('click',()=>{
  const nick=getNick(); if(!nick) return;
  soloMode=false; names[0]=nick; isHost=true; myPlayer=0;
  const code=shortId();
  $('roomcode').value=code;
  $('stepName').classList.add('hide'); $('stepHost').classList.remove('hide');
  setStatus('연결 서버 접속 중…');
  net.peer=new Peer(roomToPeerId(code), {config:PEER_CONFIG});
  net.peer.on('open',()=>setStatus('상대 대기 중… 코드: '+code,'ok'));
  net.peer.on('error',e=>setStatus('오류: '+e.type+' (코드 충돌 시 새로고침)','err'));
  net.peer.on('connection',conn=>{
    // 대기열이 가득 찼으면 거절
    if(net.waiting.length>=MAX_WAIT){
      conn.on('open',()=>{ try{ conn.send({t:'full'}); }catch(_){} setTimeout(()=>conn.close(),400); });
      return;
    }
    const entry={ conn, name:'(입력 중…)', id:Math.random().toString(36).slice(2,8) };
    net.waiting.push(entry);
    conn.on('open',()=>{ startKeepaliveFor(conn); });
    conn.on('data',d=>handleHostData(d, entry));
    conn.on('close',()=>{ removeWaiting(entry); });
    conn.on('error',e=>console.warn('host conn error',e));
  });
});

$('joincode').addEventListener('input',e=>{ e.target.value=e.target.value.replace(/[^0-9]/g,''); });
$('btnJoin').addEventListener('click',()=>{
  let nick=$('nick').value.trim();
  const code=$('joincode').value.trim().replace(/[^0-9]/g,'');
  if(!nick){ nick='파랑이'+(Math.floor(Math.random()*90)+10); $('nick').value=nick; }
  if(!code){ setStatus('초대 코드를 입력해주세요','err'); return; }
  names[1]=nick; soloMode=false; isHost=false; myPlayer=1;
  setStatus('연결 서버 접속 중…');
  net.peer=new Peer({config:PEER_CONFIG});
  net.peer.on('open',()=>{
    setStatus('방에 연결 중…');
    const conn=net.peer.connect(roomToPeerId(code),{reliable:true});
    net.conn=conn;
    conn.on('open',()=>{ conn.send({t:'hello', name:names[1], ver:GAME_VER}); setStatus('입장 완료! 방장이 선택할 때까지 대기 중…','ok'); startKeepalive(); });
    conn.on('data',d=>handleData(d));
    conn.on('close',onDisconnect);
    conn.on('error',e=>setStatus('연결 오류: '+(e&&e.type||e),'err'));
    setTimeout(()=>{ if(!net.ready) setStatus('연결이 지연됩니다. 코드가 맞는지, 방이 열려있는지 확인하세요','err'); },15000);
  });
  net.peer.on('error',e=>{
    let msg='오류: '+e.type;
    if(e.type==='peer-unavailable') msg='해당 코드의 방을 찾을 수 없어요. 코드를 확인하세요';
    setStatus(msg,'err');
  });
});

// ===== 방장 대기열 관리 =====
function startKeepaliveFor(conn){
  // 각 대기 연결도 살아있게(간단히 공용 타이머 재사용)
  if(!kaTimer) startKeepalive();
}
function removeWaiting(entry){
  const i=net.waiting.indexOf(entry);
  if(i>=0) net.waiting.splice(i,1);
  // 대전 중이던 상대가 나가면 처리
  if(net.conn===entry.conn && net.matchOpen){
    net.matchOpen=false; net.conn=null;
    if(gameActive){ gameActive=false; showToast('상대가 나갔어요'); backToHostWait(); }
  }
  renderWaitList();
}
function handleHostData(d, entry){
  if(d.t==='ping') return;
  if(d.t==='hello'){
    if(d.ver && d.ver!==GAME_VER){
      try{ entry.conn.send({t:'verwarn', host:GAME_VER}); }catch(_){}
    }
    entry.name = d.name || '도전자';
    renderWaitList();
  } else if(net.conn===entry.conn) {
    // 현재 대전 중인 상대의 게임 데이터만 처리
    handleData(d);
  }
  // 대전 상대 아닌 대기자의 게임 메시지는 무시
}
function renderWaitList(){
  const box=$('waitList'); if(!box) return;
  if(net.waiting.length===0){
    box.innerHTML='<div class="wlEmpty">대기 중인 도전자가 없어요…</div>';
    return;
  }
  box.innerHTML='';
  net.waiting.forEach(entry=>{
    const row=document.createElement('div'); row.className='wlItem';
    const dot=document.createElement('span'); dot.className='wlDot'; row.appendChild(dot);
    const nm=document.createElement('span'); nm.className='wlName'; nm.textContent=entry.name; row.appendChild(nm);
    const btn=document.createElement('button'); btn.className='wlPick';
    const isCurrent=(net.conn===entry.conn && net.matchOpen);
    btn.textContent = isCurrent ? '대전 중' : '선택';
    btn.disabled = isCurrent || net.matchOpen;   // 대전 중엔 다른 선택 잠금
    btn.addEventListener('click',()=>pickChallenger(entry));
    row.appendChild(btn);
    box.appendChild(row);
  });
}
function pickChallenger(entry){
  if(net.matchOpen) return;
  if(!entry.conn || !entry.conn.open){ removeWaiting(entry); return; }
  net.conn=entry.conn;
  net.matchOpen=true;
  names[1]=entry.name;
  entry.conn.send({t:'start', hostName:names[0], guestName:names[1]});
  // 나머지 대기자에게 "대기 중" 통보
  net.waiting.forEach(e=>{ if(e!==entry){ try{ e.conn.send({t:'queued'}); }catch(_){} } });
  renderWaitList();
  startOnline();
}
// 대전 종료 후 방장 대기 화면으로 복귀(대기열 유지)
function backToHostWait(){
  net.matchOpen=false; net.conn=null;
  $('result').style.display='none';
  $('hud').classList.add('hide'); $('hostPanel').classList.add('hide');
  $('lobby').style.display='flex';
  $('stepName').classList.add('hide');
  $('stepHost').classList.remove('hide');
  setStatus('다음 도전자를 선택하세요','ok');
  renderWaitList();
}

function handleData(d){
  if(d.t==='ping'){ return; }   // keepalive
  if(d.t==='full'){
    setStatus('방 대기열이 가득 찼어요 (최대 4명). 잠시 후 다시 시도하세요.','err');
  } else if(d.t==='queued'){
    setStatus('다른 도전자가 대전 중이에요. 방장이 선택할 때까지 대기 중…','ok');
  } else if(d.t==='bye'){
    // 방장이 대전 종료 -> 게스트는 로비로
    gameActive=false;
    showToast('대전이 종료되었어요');
    setTimeout(()=>{ if(confirm('대전이 끝났어요. 로비로 돌아갈까요?')) location.reload(); },300);
  } else if(d.t==='verwarn'){
    alert('상대와 게임 버전이 다릅니다 (방장: '+d.host+', 나: '+GAME_VER+').\n양쪽 모두 Ctrl+Shift+R로 새로고침 후 다시 시도하세요.');
  } else if(d.t==='start'){
    names[0]=d.hostName; names[1]=d.guestName; startOnline();
  } else if(d.t==='shot'){
    // 게스트가 보낸 발사 요청 -> 호스트만 물리에 적용
    if(isHost) applyShot(d.uid, d.vx, d.vz);
  } else if(d.t==='state'){
    // (구버전) 호스트가 보낸 알 위치
    if(!isHost) applyState(d);
  } else if(d.t==='st'){
    // 압축된 알 위치 -> 게스트 반영
    if(!isHost) applyStateCompact(d);
  } else if(d.t==='turn'){
    // 호스트가 알린 턴 전환 -> 게스트 반영
    if(!isHost){ currentTurn=d.currentTurn; guestTurnUpdate(); }
  } else if(d.t==='win'){
    if(!isHost){ gameActive=false; showResult(d.winner); }
  } else if(d.t==='rematch'){
    doRematch();
  } else if(d.t==='skill'){
    // 상대가 스킬 사용 -> 양쪽 동일 처리
    if(d.name==='add'){
      applyAddEggs(d.side, d.specs);
      if(isHost) broadcastState(true);
    } else if(d.name==='quake'){
      if(isPhysicsOwner()) applyQuake();
      else { showToast('💥 지진 발생!'); shake(0.7); }
    } else if(d.name==='bomb'){
      applyAddBomb(d.bx, d.bz);
      if(isHost) broadcastState(true);
    }
  }
}
// 게스트: 받은 상태를 '목표값'으로 저장 (tick에서 부드럽게 따라감)
// 게스트: 압축 배열 상태를 목표값으로 저장
function applyStateCompact(d){
  const a=d.a; if(!a) return;
  const stride=5;
  for(let k=0;k<eggs.length && k*stride<a.length;k++){
    const e=eggs[k], o=k*stride;
    const x=a[o]/50, z=a[o+1]/50, ry=a[o+2]/100, alive=a[o+3], y=a[o+4]/50;
    if(!e.userData.tgt){ e.position.set(x,y,z); e.rotation.y=ry; }
    e.userData.tgt={x,y,z,ry};
    if(alive===0) e.userData.alive=false;
    e.visible = alive===1 || y>-7;
  }
  moving = d.m===1;
  updateHUD();
}
// (구버전 호환)
function applyState(d){
  const s=d.s; if(!s) return;
  for(let k=0;k<eggs.length && k<s.length;k++){
    const e=eggs[k], st=s[k];
    // 첫 수신이면 즉시 배치, 이후엔 목표만 갱신
    if(!e.userData.tgt){
      e.position.set(st.x, st.y, st.z); e.rotation.y=st.ry;
    }
    e.userData.tgt={x:st.x, y:st.y, z:st.z, ry:st.ry};
    const aliveNow = st.a===1;
    if(!aliveNow){ e.userData.alive=false; }
    e.visible = aliveNow || st.y>-7;
  }
  moving = !!d.moving;
  updateHUD();
}
function guestTurnUpdate(){
  selectedEgg=null; aimGroup.visible=false; moving=false; setTopView(); updateHUD();
  setHint(humanControls()
    ? '<b>내 알을 클릭</b>해서 시점을 전환하세요'
    : `<b>${names[currentTurn]}</b>님의 차례입니다`);
}
function startOnline(){ net.ready=true; beginMatch(); }
let kaTimer=null;
function startKeepalive(){
  if(kaTimer) clearInterval(kaTimer);
  kaTimer=setInterval(()=>{ if(net.conn && net.conn.open) net.conn.send({t:'ping'}); }, 4000);
}
function onDisconnect(){
  gameActive=false;
  showToast('상대 연결이 끊어졌습니다');
  setTimeout(()=>{ if(confirm('상대 연결이 끊어졌습니다. 로비로 돌아갈까요?')) location.reload(); },300);
}
</script>
